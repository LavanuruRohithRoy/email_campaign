name: Backend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Export test env
        run: |
          echo "APP_ENV=test" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/postgres" >> $GITHUB_ENV
          echo "DATABASE_URL_SYNC=postgresql://postgres:postgres@127.0.0.1:5432/postgres" >> $GITHUB_ENV
          echo "REDIS_URL=redis://127.0.0.1:6379/0" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=TEST" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=TEST" >> $GITHUB_ENV
          echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          echo "AWS_SQS_SEND_QUEUE_URL=http://localhost/queue/send" >> $GITHUB_ENV
          echo "AWS_SQS_EVENTS_QUEUE_URL=http://localhost/queue/events" >> $GITHUB_ENV
          echo "ALLOWED_ORIGINS=http://localhost:5173" >> $GITHUB_ENV
          echo "APP_BASE_URL=http://localhost:8000" >> $GITHUB_ENV
          echo "VITE_API_BASE_URL=http://localhost:8000" >> $GITHUB_ENV

      - name: Wait for services
        run: |
          sleep 5

      - name: Run alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          alembic upgrade head

      - name: Run backend tests
        run: |
          python -m pytest backend/tests -q
        working-directory: .
