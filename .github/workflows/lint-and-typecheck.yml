name: Lint and Typecheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Run ruff
        run: |
          ruff check backend
      - name: Run mypy
        run: |
          mypy backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend tools
        run: |
          cd frontend
          npm ci
      - name: ESLint
        run: |
          cd frontend
          npx eslint .
      - name: TypeScript typecheck
        run: |
          cd frontend
          npx tsc --noEmit
