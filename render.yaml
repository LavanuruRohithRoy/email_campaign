# Render service definitions (example) - do not auto-deploy
services:
  - type: web
    name: email-backend
    env: docker
    plan: free
    buildCommand: ""
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT"
  - type: worker
    name: email-worker
    env: docker
    plan: free
    startCommand: "python -m app.workers.send_worker"
